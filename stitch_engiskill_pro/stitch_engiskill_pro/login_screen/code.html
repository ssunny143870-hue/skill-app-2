<!-- Login Form -->
<form action="#" class="space-y-stack-sm" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-on-surface-variant text-sm font-medium ml-1" for="email">Work Email</label>
<div class="input-inset relative flex items-center border border-outline-variant rounded-full px-5 py-3">

</div>
</div>
<!-- Password Field -->
<div class="space-y-2">

<label class="text-on-surface-variant text-sm font-medium" for="password">Secret Key</label>

</div>
<div class="input-inset relative flex items-center border border-outline-variant rounded-full px-5 py-3">
<span class="material-symbols-outlined text-outline text-xl mr-3">lock</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-outline" id="password" placeholder="••••••••" type="password"/>

<!-- Interactive micro-interactions -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    const parent = input.closest('.input-inset');
                    if (parent) {
                        parent.style.borderColor = 'rgba(207, 188, 255, 0.6)';
                    }
                });
                input.addEventListener('blur', () => {
                    const parent = input.closest('.input-inset');
                    if (parent) {
                        parent.style.borderColor = '';
                    }
                });
            });

            // Password visibility toggle
            const togglePass = document.querySelector('button[type="button"].material-symbols-outlined');
            const passInput = document.getElementById('password');
            
            if (togglePass && passInput) {
                togglePass.addEventListener('click', () => {
                    const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passInput.setAttribute('type', type);
                    togglePass.textContent = type === 'password' ? 'visibility' : 'visibility_off';
                });
            }
        });
    </script>
