<style>
        .glass-panel {
            background: rgba(20, 18, 24, 0.4);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(207, 188, 255, 0.4)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 30px rgba(207, 188, 255, 0.8)); transform: scale(1.05); }
        }

        .animate-glow {
            animation: pulse-glow 3s ease-in-out infinite;
        }

        .loading-bar-fill {
            width: 0%;
            animation: fill-progress 4s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        @keyframes fill-progress {
            0% { width: 0%; }
            30% { width: 45%; }
            60% { width: 55%; }
            100% { width: 100%; }
        }

        .floating-orb {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(207, 188, 255, 0.2) 0%, transparent 70%);
            filter: blur(40px);
            z-index: 1;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
